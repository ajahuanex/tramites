server {
  listen 80;
  server_name localhost;
  
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # Redirige todo al index.html para que el Angular Router funcione (SPA)
    try_files $uri $uri/ /index.html;
  }

  # Redirección para /pb-api/* -> PocketBase (Reescribe eliminando el prefijo)
  location /pb-api/ {
    proxy_pass http://pocketbase:8090/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Ruta estándar de PocketBase (Opcional, por si se accede directo)
  location /api/ {
    proxy_pass http://pocketbase:8090/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
