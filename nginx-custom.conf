server {
  listen 80;
  server_name localhost;
  
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # Redirige todo al index.html para que el Angular Router funcione (SPA)
    try_files $uri $uri/ /index.html;
  }

  # Configuración estándar para PocketBase (Frontend -> /api -> PB /api)
  location /api/ {
    proxy_pass http://pocketbase:8090/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Soporte para /pb-api por si se requiere (Redirige a /api de PB)
  location /pb-api/ {
    proxy_pass http://pocketbase:8090/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
