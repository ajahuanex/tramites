version: '3.8'

services:
  # SERVICIO DEL FRONTAL (ANGULAR + NGINX)
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.local
    container_name: tramites_frontend
    restart: unless-stopped
    ports:
      - "8087:80"
    depends_on:
      - pocketbase

  # SERVICIO DEL BACKEND (POCKETBASE)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: tramites_pocketbase
    restart: unless-stopped
    ports:
      - "8094:8090"
    volumes:
      - ./pocketbase/pb_data:/pb_data
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data", "--publicDir=/pb_public"]
